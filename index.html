<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Presien — Meet the Team</title>
<meta name="theme-color" content="#3E3E3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&family=DM+Mono:wght@300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --charcoal: #3E3E3E;
    --teal: #4A738A;
    --stone: #E4E3DE;
    --mid-blue: #96BACB;
    --sky-blue: #D8E6ED;
    --white: #FFFFFF;
  }

  html, body {
    height: 100%;
    font-family: 'DM Sans', Arial, sans-serif;
    background: var(--charcoal);
    color: var(--white);
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    justify-content: center;
  }

  .page-container {
    width: 100%;
    max-width: 340px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 1.75rem 2rem 2.5rem;
  }

  /* ── LOGO ── */
  .logo-bar {
    width: 100%;
    padding: 0.75rem 0 0;
    margin-bottom: 1.75rem;
  }

  .logo-bar svg {
    width: 100%;
    height: auto;
    display: block;
  }

  /* ── INTRO ── */
  .page-intro {
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin-bottom: 1.5rem;
  }

  /* ── PERSON CARDS ── */
  .person-card {
    border: 0.5px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 1.25rem 1.25rem 1rem;
    margin-bottom: 0.875rem;
  }

  .person-name {
    font-size: clamp(24px, 7vw, 30px);
    font-weight: 300;
    color: var(--white);
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 3px;
  }

  .person-role {
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--mid-blue);
    margin-bottom: 2px;
  }

  .person-company {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 1rem;
  }

  .contact-rows {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding-bottom: 1rem;
    margin-bottom: 1rem;
    border-bottom: 0.5px solid rgba(255,255,255,0.08);
  }

  .contact-row {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .contact-icon {
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .contact-text {
    font-size: 12px;
    font-weight: 300;
    color: var(--sky-blue);
    letter-spacing: 0.01em;
  }

  .save-btn {
    display: block;
    width: 100%;
    padding: 11px 0;
    background: var(--teal);
    color: var(--white);
    border: none;
    border-radius: 7px;
    font-family: 'DM Sans', Arial, sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    text-align: center;
    text-decoration: none;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .save-btn:active {
    opacity: 0.75;
  }

  /* ── FOOTER ── */
  .page-footer {
    margin-top: auto;
    padding-top: 1.5rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .footer-line {
    flex: 1;
    height: 0.5px;
    background: rgba(255,255,255,0.1);
  }

  .footer-text {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.2);
  }
</style>
</head>

  'X-SOCIALPROFILE;type=linkedin:https://linkedin.com/in/johngnaughton/',
  'END:VCARD'
].join('\r\n');

function saveMark(e) {
  e.preventDefault();
  var blob = new Blob([VCARD_MARK], { type: 'text/vcard;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'mark-richards-presien.vcf';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
