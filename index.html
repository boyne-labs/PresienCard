<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>John Naughton — Presien</title>
<meta name="theme-color" content="#3E3E3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&family=DM+Mono:wght@300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --charcoal: #3E3E3E;
    --teal: #4A738A;
    --stone: #E4E3DE;
    --mid-blue: #96BACB;
    --sky-blue: #D8E6ED;
    --white: #FFFFFF;
  }

  html, body {
    height: 100%;
    font-family: 'DM Sans', Arial, sans-serif;
    background: var(--stone);
    color: var(--charcoal);
    -webkit-font-smoothing: antialiased;
  }

  .page { display: none; min-height: 100vh; flex-direction: column; }
  .page.active { display: flex; }

  /* ── SHOW PAGE (your phone) ── */
  #show {
    background: var(--charcoal);
    align-items: center;
    justify-content: space-between;
    padding: 3rem 2rem 2.5rem;
  }


  .logo-bar {
    width: 100%;
    padding: 1.75rem 0 1.25rem;
  }

  .logo-bar svg {
    width: 100%;
    height: auto;
  }

  .logo-bar-light {
    width: 100%;
    padding: 1.5rem 0 0;
  }

  .logo-bar-light svg {
    width: 100%;
    height: auto;
  }

  .show-top {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    width: 100%;
  }

  .bracket-mark {
    margin-bottom: 2rem;
  }

  .show-name {
    font-size: clamp(28px, 8vw, 38px);
    font-weight: 300;
    color: var(--white);
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 10px;
  }

  .show-role {
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--mid-blue);
    margin-bottom: 3px;
  }

  .show-company {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--teal);
  }

  .show-divider {
    width: 100%;
    max-width: 340px;
    height: 0.5px;
    background: rgba(255,255,255,0.12);
    margin: 2rem 0;
  }

  .show-qr-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    width: 100%;
    max-width: 340px;
  }

  .qr-box {
    background: var(--white);
    border-radius: 10px;
    padding: 14px;
    display: inline-flex;
  }

  .qr-hint {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    text-align: center;
  }

  .show-contacts {
    width: 100%;
    max-width: 340px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .show-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .show-contact-text {
    font-size: 13px;
    font-weight: 300;
    color: #D8E6ED;
    letter-spacing: 0.01em;
  }

  .show-footer {
    width: 100%;
    max-width: 340px;
    padding-top: 2rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .show-footer-line {
    flex: 1;
    height: 0.5px;
    background: rgba(255,255,255,0.1);
  }

  .show-footer-text {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.2);
  }

  /* ── RECEIVE PAGE (their phone) ── */
  #receive {
    background: var(--stone);
    align-items: center;
    justify-content: flex-start;
    padding: 0;
  }

  .receive-header {
    width: 100%;
    background: var(--charcoal);
    padding: 2.5rem 2rem 2rem;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }

  .receive-name {
    font-size: clamp(26px, 7vw, 34px);
    font-weight: 300;
    color: var(--white);
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
    margin-top: 1.25rem;
  }

  .receive-role {
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--mid-blue);
    margin-bottom: 3px;
  }

  .receive-company {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--teal);
  }

  .receive-body {
    width: 100%;
    padding: 0 2rem 3rem;
    display: flex;
    flex-direction: column;
    gap: 0;
    max-width: 480px;
    margin: 0 auto;
  }

  .contact-block {
    padding: 1.1rem 0;
    border-bottom: 0.5px solid rgba(62,62,62,0.12);
    display: flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
  }

  .contact-block:last-of-type {
    border-bottom: none;
  }

  .contact-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: var(--charcoal);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .contact-icon svg {
    display: block;
  }

  .contact-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(62,62,62,0.45);
    margin-bottom: 2px;
  }

  .contact-value {
    font-size: 14px;
    font-weight: 300;
    color: var(--charcoal);
    line-height: 1.3;
  }

  .save-btn {
    display: block;
    width: 100%;
    padding: 15px;
    background: var(--teal);
    color: var(--white);
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', Arial, sans-serif;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    margin-top: 1.5rem;
    -webkit-tap-highlight-color: transparent;
  }

  .save-btn:active {
    opacity: 0.85;
  }

  .receive-footer {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 2rem;
    padding-bottom: 0.5rem;
  }

  .receive-footer-text {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(62,62,62,0.3);
  }

  /* Fade in */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .page.active > * {
    animation: fadeUp 0.4s ease both;
  }

  .page.active > *:nth-child(2) { animation-delay: 0.06s; }
  .page.active > *:nth-child(3) { animation-delay: 0.12s; }
</style>
</head>

<script>
var VCARD = [
  'BEGIN:VCARD',
  'VERSION:3.0',
  'FN:John Naughton',
  'N:Naughton;John;;;',
  'TITLE:Chief Commercial Officer',
  'ORG:Presien',
  'EMAIL;TYPE=WORK:john@presien.com',
  'TEL;TYPE=CELL:+61402050360',
  'URL:https://presien.com',
  'X-SOCIALPROFILE;type=linkedin:https://linkedin.com/in/johngnaughton/',
  'END:VCARD'
].join('\r\n');

function route() {
  var params = new URLSearchParams(window.location.search);
  var view = params.get('view');
  document.getElementById('show').classList.toggle('active', view !== 'card');
  document.getElementById('receive').classList.toggle('active', view === 'card');
}


function saveContact(e) {
  e.preventDefault();
  var blob = new Blob([VCARD], { type: 'text/vcard;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'john-naughton-presien.vcf';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

route();

window.addEventListener('popstate', route);
</script>
